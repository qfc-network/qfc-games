name: Docker Build & Push

on:
  push:
    branches: [main, staging]

concurrency:
  group: qfc-games-docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: qfc-network/qfc-games-lobby

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Compute short SHA
        id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./lobby
          file: ./lobby/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ steps.vars.outputs.short_sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-sha-${{ steps.vars.outputs.short_sha }}

      - name: Dispatch qfc-testnet image tag update
        if: github.ref_type == 'branch'
        env:
          SHORT_SHA: ${{ steps.vars.outputs.short_sha }}
          BRANCH: ${{ github.ref_name }}
        run: |
          TAG="${BRANCH}-sha-${SHORT_SHA:0:7}"
          curl -sf -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.TESTNET_DISPATCH_TOKEN }}" \
            https://api.github.com/repos/qfc-network/qfc-testnet/dispatches \
            -d "{\"event_type\":\"image-published\",\"client_payload\":{\"service\":\"qfc-games-lobby\",\"tag\":\"${TAG}\",\"branch\":\"${BRANCH}\",\"sha\":\"${{ github.sha }}\"}}"
          echo "Dispatched qfc-testnet update: ${TAG}"
